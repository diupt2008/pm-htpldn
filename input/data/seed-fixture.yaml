# =============================================================================
# seed-fixture.yaml — Single source of truth cho giá trị nhập khi seed data test
# =============================================================================
#
# TERMINOLOGY NOTE (2026-04-24 v2.3):
#   - Trong file này các cụm "test function" / "test function phase" / "TEST FUNCTION"
#     tương đương "T3 workflow phase" theo plan/todo v1.6. Giữ thuật ngữ cũ trong
#     comment để tránh churn toàn file; logic vẫn đúng (mô tả phase sau seed).
#   - Khi tester đọc fixture: "test function" = "workflow phase T3" = advance state machine.
#
# MINDSET PURE SEED (chốt 2026-04-23):
#   - Mục tiêu: TẠO DATA thành công, KHÔNG test workflow.
#   - Module SM: chỉ seed ở ENTRY STATE (state đầu sau khi thêm mới). KHÔNG advance.
#     State transitions (kiểm tra, phân công, phê duyệt, ...) = việc của T3 workflow phase.
#   - Seed OK = record xuất hiện đúng entry state, counter KPI hiển thị đúng.
#     Nếu gặp bug khi seed → NOTE lại, KHÔNG log bug ngay. Log ở T3 workflow phase.
#   - Tester KHÔNG cần switch account nhiều khi seed — chỉ cần account tạo mới (CB NV).
#
# Hệ quả của pure seed:
#   - Entity phụ thuộc workflow (KET_QUA_DAO_TAO, KET_QUA_DANH_GIA, HĐ liên kết VV HOÀN THÀNH)
#     KHÔNG seed được ở phase này → populate ở T3 workflow phase.
#   - Dashboard KPI values post-seed KHÁC với post-test-function — xem 2 section riêng.
#
# Cách dùng:
#   - Mở file này BÊN CẠNH trình duyệt khi seed data.
#   - Mỗi entity có array variant. Seed lặp cho từng variant từ index 1 → N.
#   - `state_target` = state ENTRY cần đạt khi tạo mới (với module có SM).
#   - `*_link` = reference cross-module. Link chỉ valid nếu entity đích đã seed trước.
#   - Workflow chi tiết (button, account switch) → xem ../flow-module.md — KHÔNG làm trong seed.
#
# Khi SRS update hoặc thêm module mới → bump fixture_version + note changelog.
