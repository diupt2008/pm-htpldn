# =============================================================================
# DASHBOARD EXPECTED KPI — 2 SECTIONS (POST-SEED + POST-TEST-FUNCTION)
# =============================================================================
# Dashboard KHÔNG seed entity — chỉ đọc aggregate từ data đã seed.
#
# 2 snapshot giá trị kỳ vọng:
#   (A) POST-SEED — sau khi seed pure xong. Hầu hết KPI = count records at entry state.
#   (B) POST-TEST-FUNCTION — sau khi T3 workflow phase advance state. Giá trị varied.
#
# Nếu KPI khác expected (A) ngay sau seed = BUG aggregate / scope filter / state filter.
#
# LƯU Ý: fixture assume role cấp TW (cb_nv_tw_01) → dashboard scope toàn quốc.
# Với BN/ĐP scope hẹp hơn → value ≤ các số dưới.

dashboard_expected_kpi_post_seed:
  scope_assumption: "Role TW (cb_nv_tw_01), filter kỳ 2026-01-01 → 2026-12-31, NGAY SAU khi seed pure xong"
  cascade_block_adjust: |
    Nếu có cascade-block trong P2 (task T2.A* BLOCKED → 0 record entity đó),
    expected KPI phải ADJUST XUỐNG 0 cho entity bị block. Đừng log bug khi KPI = 0
    vì upstream BE bug — mark "Cascade-affected" trong checkpoint-P2.
    Tracker actual: xem todo.md § Cascade-block registry.
    Ví dụ round 4 tại 2026-04-24:
      - T2.A1 HOI_DAP BLOCKED → KPI-01 expected = 0 (không phải 6)
      - T2.A3 TV_CHUYEN_SAU BLOCKED → KPI ref TVCS = 0
      - T2.B4 HO_SO_CHI_TRA BE-sync empty → KPI-Chi-trả = 0
      - T2.B5 TV_NHANH BE-sync empty → KPI TV Nhanh = 0
  kpis:
    - kpi: "KPI-01"
      fr: "FR-I-01"
      nhan: "Tổng hỏi đáp"
      expected: 11
      derivation: "count(hoi_dap_variants) = 11 (tất cả state MỚI, fixture v2.5: 6 chính + 5 edge)"
    - kpi: "KPI-02"
      fr: "FR-I-02"
      nhan: "VV đã tiếp nhận"
      expected: 15
      derivation: "count(vu_viec_variants) = 15 (tất cả state ĐÃ TIẾP NHẬN — entry state; variant[7] reserve Admin reopen, [8..15] edge fixture v2.5)"
    - kpi: "KPI-03"
      fr: "FR-I-03"
      nhan: "VV đang hỗ trợ"
      expected: 15
      derivation: |
        SRS FR-I-03 strict (NotebookLM verify 2026-04-23): count WHERE state IN
        (DA_TIEP_NHAN, DANG_XU_LY, DA_PHAN_CONG). Fixture v2.5: all 15 VV ở DA_TIEP_NHAN → 15.
      srs_ambiguity_flag: |
        SM-VUVIEC 12 state, KPI-03 bỏ qua DANG_KIEM_TRA, CHO_PHE_DUYET.
        Ở pure seed không ảnh hưởng (toàn bộ DA_TIEP_NHAN). Ở post-test-function thì quan trọng.
    - kpi: "KPI-04"
      fr: "FR-I-04"
      nhan: "VV hoàn thành"
      expected: 0
      derivation: "Pure seed: 0 VV HOÀN THÀNH. Sau test function M3 → số sẽ tăng."
    - kpi: "KPI-05"
      fr: "FR-I-05"
      nhan: "Khóa ĐT đang diễn ra"
      expected: 0
      derivation: "Pure seed: 0 khóa học DANG_DIEN_RA (all DỰ THẢO)."
    - kpi: "KPI-06"
      fr: "FR-I-06"
      nhan: "Khóa ĐT đã diễn ra"
      expected: 0
      derivation: "Pure seed: 0 khóa học KET_THUC/HOAN_THANH (all DỰ THẢO)."
      srs_ambiguity_flag: |
        SRS typo: FR-I-06 ghi 'KET_THUC' nhưng entity KHOA_HOC enum chỉ có DA_KET_THUC, HOAN_THANH.
        Ở pure seed không trigger ambiguity (value = 0 both ways). Cần CĐT clarify ở post-test.
    - kpi: "KPI-07"
      fr: "FR-I-07"
      nhan: "Tổng CG/TVV"
      expected: 0
      derivation: "Pure seed: 0 TVV DANG_HOAT_DONG (all MỚI ĐĂNG KÝ). Sau test function M2 → số sẽ tăng."
    - kpi: "KPI-08"
      fr: "FR-I-08"
      nhan: "Biểu đồ đánh giá HQ"
      expected: "empty_state"
      derivation: |
        Pure seed: ket_qua_danh_gia_variants = null (chưa chấm điểm VV nào).
        → Chart render empty state 'Chưa có dữ liệu đánh giá'.
        Formula khi có data: AVG(diem_tong) + BR-SLA-05.
    - kpi: "KPI-09"
      fr: "FR-I-09"
      nhan: "Biểu đồ chất lượng đào tạo"
      expected: "empty_state"
      derivation: |
        Pure seed: ket_qua_dao_tao_variants = null (chưa nhập điểm khóa nào).
        → Chart render empty state.
        Formula khi có data: COUNT(xep_loai='DAT')/COUNT(*) × 100 + AVG(diem_kiem_tra).

