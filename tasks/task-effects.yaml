# Task effects mapping — task ID → entity bị ảnh hưởng
# Khi task X chạy xong, slash command /task-done X cascade theo file này.
#
# Format:
#   <task_id>:
#     entities: [list entity name match state-snapshot.md cột "Entity"]
#     state_change: <create|advance|consume|delete|none>  (optional, doc only)
#     note: <ghi chú nếu cần>  (optional)
#
# Entity name dùng đúng key state-snapshot.md "Entity" column (vd: HD, VV, Kho_QA).
# Task không có trong file này → /task-done sẽ hỏi user entity nào.
#
# Maintain rule: thêm entry mới khi tạo task mới có state change.

